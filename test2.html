<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepLearn Visualize - Production-Grade Neural Network Visualization</title>
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <!-- Custom Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b3b3b3;
            --accent-primary: #00f5ff;
            --accent-secondary: #ff00ff;
            --accent-tertiary: #ffff00;
            --gradient-primary: linear-gradient(135deg, #00f5ff, #ff00ff);
            --gradient-secondary: linear-gradient(135deg, #ff00ff, #ffff00);
            --border-color: #333333;
            --shadow-primary: 0 0 20px rgba(0, 245, 255, 0.3);
            --shadow-secondary: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            line-height: 1.6;
        }

        .container {
            display: grid;
            grid-template-columns: 300px 1fr 350px;
            height: 100vh;
            gap: 1px;
            background: var(--border-color);
        }

        .sidebar {
            background: var(--bg-secondary);
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
        }

        .main-content {
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        .info-panel {
            background: var(--bg-secondary);
            padding: 20px;
            overflow-y: auto;
            border-left: 1px solid var(--border-color);
        }

        .header {
            text-align: center;
            padding: 20px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .architecture-selector {
            margin-bottom: 30px;
        }

        .architecture-btn {
            width: 100%;
            padding: 15px;
            margin: 5px 0;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .architecture-btn:hover {
            background: var(--gradient-primary);
            color: var(--bg-primary);
            box-shadow: var(--shadow-primary);
            transform: translateY(-2px);
        }

        .architecture-btn.active {
            background: var(--gradient-primary);
            color: var(--bg-primary);
            box-shadow: var(--shadow-primary);
        }

        .control-panel {
            margin-top: 30px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .slider {
            width: 100%;
            height: 5px;
            border-radius: 5px;
            background: var(--bg-tertiary);
            outline: none;
            -webkit-appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: var(--accent-primary);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-primary);
        }

        .dropdown {
            width: 100%;
            padding: 10px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 5px;
            cursor: pointer;
        }

        .visualization-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .canvas-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }

        .overlay-btn {
            padding: 10px 20px;
            background: rgba(42, 42, 42, 0.9);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .overlay-btn:hover {
            background: var(--gradient-primary);
            color: var(--bg-primary);
            box-shadow: var(--shadow-primary);
        }

        .info-content {
            color: var(--text-secondary);
            line-height: 1.8;
        }

        .info-section {
            margin-bottom: 30px;
            padding: 20px;
            background: var(--bg-tertiary);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .info-section h3 {
            color: var(--accent-primary);
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .math-formula {
            background: var(--bg-primary);
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: 'JetBrains Mono', monospace;
            overflow-x: auto;
            border-left: 3px solid var(--accent-primary);
        }

        .pros-cons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 15px;
        }

        .pros, .cons {
            padding: 15px;
            border-radius: 8px;
        }

        .pros {
            background: rgba(0, 245, 255, 0.1);
            border: 1px solid var(--accent-primary);
        }

        .cons {
            background: rgba(255, 0, 255, 0.1);
            border: 1px solid var(--accent-secondary);
        }

        .pros h4 {
            color: var(--accent-primary);
            margin-bottom: 10px;
        }

        .cons h4 {
            color: var(--accent-secondary);
            margin-bottom: 10px;
        }

        .component-breakdown {
            display: grid;
            gap: 10px;
            margin-top: 15px;
        }

        .component-item {
            padding: 10px;
            background: var(--bg-secondary);
            border-radius: 5px;
            border-left: 3px solid var(--accent-tertiary);
        }

        .component-item strong {
            color: var(--accent-tertiary);
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .node:hover {
            filter: brightness(1.5);
        }

        .connection {
            stroke: var(--accent-primary);
            stroke-width: 2;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .connection:hover {
            stroke-width: 4;
            opacity: 1;
        }

        .tooltip {
            position: absolute;
            padding: 10px;
            background: rgba(42, 42, 42, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            pointer-events: none;
            font-size: 0.9rem;
            z-index: 1000;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .example-selector {
            margin-top: 20px;
        }

        .example-btn {
            padding: 8px 15px;
            margin: 2px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 15px;
            font-size: 0.8rem;
            transition: all 0.3s ease;
        }

        .example-btn:hover {
            background: var(--accent-primary);
            color: var(--bg-primary);
        }

        .example-btn.active {
            background: var(--accent-primary);
            color: var(--bg-primary);
        }

        .stats-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(42, 42, 42, 0.9);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            min-width: 200px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
            font-size: 0.9rem;
        }

        .stat-value {
            color: var(--accent-primary);
            font-family: 'JetBrains Mono', monospace;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            overflow: hidden;
            margin: 5px 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient-primary);
            transition: width 0.3s ease;
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 250px 1fr 300px;
            }
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                grid-template-rows: 60px 1fr 200px;
            }
            
            .sidebar, .info-panel {
                display: none;
            }
            
            .canvas-overlay {
                top: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="header">
                <h1>DeepLearn Visualize</h1>
                <p>Production-Grade Neural Network Visualization</p>
            </div>

            <div class="architecture-selector">
                <h3>Select Architecture</h3>
                <button class="architecture-btn active" data-arch="cnn">
                    <i class="fas fa-layer-group"></i> CNN - Convolutional Neural Network
                </button>
                <button class="architecture-btn" data-arch="gan">
                    <i class="fas fa-yin-yang"></i> GAN - Generative Adversarial Network
                </button>
                <button class="architecture-btn" data-arch="rnn">
                    <i class="fas fa-wave-square"></i> RNN - Recurrent Neural Network
                </button>
                <button class="architecture-btn" data-arch="gnn">
                    <i class="fas fa-project-diagram"></i> GNN - Graph Neural Network
                </button>
                <button class="architecture-btn" data-arch="dqn">
                    <i class="fas fa-robot"></i> DQN - Deep Q-Network
                </button>
                <button class="architecture-btn" data-arch="diffusion">
                    <i class="fas fa-magic"></i> Diffusion Model
                </button>
                <button class="architecture-btn" data-arch="transformer">
                    <i class="fas fa-bolt"></i> Transformer
                </button>
                <button class="architecture-btn" data-arch="moe">
                    <i class="fas fa-users"></i> Mixture of Experts
                </button>
                <button class="architecture-btn" data-arch="ssm">
                    <i class="fas fa-stream"></i> SSM - State Space Model
                </button>
                <button class="architecture-btn" data-arch="mlp">
                    <i class="fas fa-project-diagram"></i> MLP - Multilayer Perceptron
                </button>
            </div>

            <div class="control-panel">
                <h3>Controls</h3>
                
                <div class="control-group">
                    <label>Learning Rate</label>
                    <input type="range" class="slider" id="learningRate" min="0.0001" max="0.1" step="0.0001" value="0.001">
                    <span id="lrValue">0.001</span>
                </div>

                <div class="control-group">
                    <label>Batch Size</label>
                    <select class="dropdown" id="batchSize">
                        <option value="16">16</option>
                        <option value="32" selected>32</option>
                        <option value="64">64</option>
                        <option value="128">128</option>
                        <option value="256">256</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Activation Function</label>
                    <select class="dropdown" id="activation">
                        <option value="relu">ReLU</option>
                        <option value="sigmoid">Sigmoid</option>
                        <option value="tanh">Tanh</option>
                        <option value="gelu">GELU</option>
                        <option value="swish">Swish</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Loss Function</label>
                    <select class="dropdown" id="lossFunction">
                        <option value="mse">MSE - Mean Squared Error</option>
                        <option value="crossentropy">Cross Entropy</option>
                        <option value="bce">Binary Cross Entropy</option>
                        <option value="mae">MAE - Mean Absolute Error</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Animation Speed</label>
                    <input type="range" class="slider" id="animSpeed" min="0.1" max="2" step="0.1" value="1">
                </div>
            </div>

            <div class="example-selector">
                <h4>Examples</h4>
                <div id="exampleButtons"></div>
            </div>
        </div>

        <div class="main-content">
            <div class="visualization-container">
                <div id="three-container"></div>
                <div class="canvas-overlay">
                    <button class="overlay-btn" id="playPause">
                        <i class="fas fa-play"></i> Play
                    </button>
                    <button class="overlay-btn" id="reset">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                    <button class="overlay-btn" id="fullscreen">
                        <i class="fas fa-expand"></i> Fullscreen
                    </button>
                </div>
                <div class="stats-panel">
                    <h4>Network Statistics</h4>
                    <div class="stat-item">
                        <span>Parameters:</span>
                        <span class="stat-value" id="paramCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span>Memory:</span>
                        <span class="stat-value" id="memoryUsage">0 MB</span>
                    </div>
                    <div class="stat-item">
                        <span>FLOPs:</span>
                        <span class="stat-value" id="flops">0</span>
                    </div>
                    <div class="stat-item">
                        <span>Accuracy:</span>
                        <span class="stat-value" id="accuracy">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="trainingProgress"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="info-panel">
            <div id="architectureInfo">
                <h2 id="archTitle">CNN - Convolutional Neural Network</h2>
                <div id="archContent">
                    <!-- Dynamic content will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip" style="display: none;"></div>

    <script>
        // Initialize MathJax
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };

        // Global variables
        let scene, camera, renderer, controls;
        let currentArchitecture = 'cnn';
        let isPlaying = false;
        let animationId;
        let networkVisualization;

        // Architecture configurations
        const architectures = {
            cnn: {
                name: 'CNN - Convolutional Neural Network',
                description: 'A deep learning architecture designed for processing grid-like data such as images.',
                components: ['Convolutional Layers', 'Pooling Layers', 'Fully Connected Layers', 'Activation Functions'],
                pros: ['Translation invariance', 'Parameter sharing', 'Local connectivity', 'Hierarchical features'],
                cons: ['High computational cost', 'Requires large datasets', 'Limited to grid-like data', 'Black box nature'],
                formula: '$$y_{i,j} = \\sum_{m=0}^{k-1} \\sum_{n=0}^{k-1} w_{m,n} \\cdot x_{i+m, j+n} + b$$',
                examples: ['LeNet-5', 'AlexNet', 'VGG', 'ResNet', 'EfficientNet'],
                useCases: ['Image classification', 'Object detection', 'Semantic segmentation', 'Medical imaging', 'Autonomous vehicles']
            },
            gan: {
                name: 'GAN - Generative Adversarial Network',
                description: 'A framework for training generative models through adversarial training.',
                components: ['Generator', 'Discriminator', 'Loss Function', 'Training Loop'],
                pros: ['Generates high-quality samples', 'Unsupervised learning', 'Versatile applications', 'Continuous improvement'],
                cons: ['Training instability', 'Mode collapse', 'High computational cost', 'Difficult to evaluate'],
                formula: '$$\\min_G \\max_D V(D,G) = \\mathbb{E}_{x\\sim p_{data}(x)}[\\log D(x)] + \\mathbb{E}_{z\\sim p_z(z)}[\\log(1-D(G(z)))]$$',
                examples: ['DCGAN', 'StyleGAN', 'CycleGAN', 'ProGAN', 'BigGAN'],
                useCases: ['Image generation', 'Style transfer', 'Data augmentation', 'Super resolution', 'Deepfakes']
            },
            rnn: {
                name: 'RNN - Recurrent Neural Network',
                description: 'Neural networks with loops, allowing information to persist.',
                components: ['Hidden State', 'Cell State', 'Gates', 'Output Layer'],
                pros: ['Sequential processing', 'Variable input length', 'Temporal dependencies', 'Memory mechanism'],
                cons: ['Vanishing gradients', 'Exploding gradients', 'Sequential computation', 'Limited memory'],
                formula: '$$h_t = \\tanh(W_{hh}h_{t-1} + W_{xh}x_t + b_h)$$',
                examples: ['Vanilla RNN', 'LSTM', 'GRU', 'Bidirectional RNN', 'Attention RNN'],
                useCases: ['Language modeling', 'Machine translation', 'Speech recognition', 'Time series prediction', 'Music generation']
            },
            gnn: {
                name: 'GNN - Graph Neural Network',
                description: 'Neural networks designed to operate on graph-structured data.',
                components: ['Node Embeddings', 'Edge Features', 'Message Passing', 'Aggregation'],
                pros: ['Handles irregular data', 'Captures relationships', 'Inductive learning', 'Scalable'],
                cons: ['Computational complexity', 'Memory intensive', 'Over-smoothing', 'Graph construction'],
                formula: '$$h_v^{(l+1)} = \\sigma\\left(W^{(l)} \\cdot \\text{AGG}\\left(\\{h_u^{(l)} : u \\in \\mathcal{N}(v)\\}\\right)\\right)$$',
                examples: ['GCN', 'GAT', 'GraphSAGE', 'GIN', 'MPNN'],
                useCases: ['Social network analysis', 'Molecular property prediction', 'Recommendation systems', 'Traffic prediction', 'Knowledge graphs']
            },
            dqn: {
                name: 'DQN - Deep Q-Network',
                description: 'Reinforcement learning algorithm that combines Q-learning with deep neural networks.',
                components: ['Q-Network', 'Experience Replay', 'Target Network', 'Epsilon-Greedy'],
                pros: ['End-to-end learning', 'Handles high-dimensional states', 'Stable training', 'Sample efficient'],
                cons: ['Overestimation bias', 'Large memory requirements', 'Hyperparameter sensitivity', 'Limited to discrete actions'],
                formula: '$$Q(s,a) \\leftarrow Q(s,a) + \\alpha[r + \\gamma \\max_{a\\'} Q(s\\',a\\') - Q(s,a)]$$',
                examples: ['DQN', 'Double DQN', 'Dueling DQN', 'Rainbow DQN', 'C51'],
                useCases: ['Game playing', 'Robot control', 'Autonomous driving', 'Resource allocation', 'Trading strategies']
            },
            diffusion: {
                name: 'Diffusion Model',
                description: 'Generative models that learn to reverse a diffusion process.',
                components: ['Forward Process', 'Reverse Process', 'Noise Schedule', 'Score Function'],
                pros: ['High-quality samples', 'Stable training', 'Flexible conditioning', 'Theoretical foundation'],
                cons: ['Slow sampling', 'High computational cost', 'Complex training', 'Memory intensive'],
                formula: '$$q(x_t|x_{t-1}) = \\mathcal{N}(x_t; \\sqrt{1-\\beta_t}x_{t-1}, \\beta_t I)$$',
                examples: ['DDPM', 'DDIM', 'Stable Diffusion', 'Imagen', 'DALL-E 2'],
                useCases: ['Image generation', 'Text-to-image', 'Audio generation', 'Video generation', 'Molecular design']
            },
            transformer: {
                name: 'Transformer',
                description: 'Attention-based architecture for sequence modeling without recurrence.',
                components: ['Self-Attention', 'Multi-Head Attention', 'Positional Encoding', 'Feed-Forward Networks'],
                pros: ['Parallel computation', 'Long-range dependencies', 'Scalable', 'Versatile'],
                cons: ['Quadratic complexity', 'Large memory usage', 'Positional encoding limitations', 'Requires large data'],
                formula: '$$\\text{Attention}(Q,K,V) = \\text{softmax}\\left(\\frac{QK^T}{\\sqrt{d_k}}\\right)V$$',
                examples: ['BERT', 'GPT', 'T5', 'Vision Transformer', 'CLIP'],
                useCases: ['Language translation', 'Text generation', 'Image classification', 'Protein folding', 'Code generation']
            },
            moe: {
                name: 'Mixture of Experts',
                description: 'Models that use sparse expert networks to increase capacity efficiently.',
                components: ['Expert Networks', 'Gating Network', 'Load Balancing', 'Sparse Activation'],
                pros: ['Large capacity', 'Efficient inference', 'Specialized experts', 'Scalable'],
                cons: ['Complex routing', 'Load imbalance', 'Training instability', 'Expert collapse'],
                formula: '$$y = \\sum_{i=1}^n G(x)_i \\cdot E_i(x)$$',
                examples: ['Switch Transformer', 'GLaM', 'ST-MoE', 'BASE Layer', 'Hash Layers'],
                useCases: ['Large language models', 'Multitask learning', 'Multilingual models', 'Recommendation systems', 'Scientific computing']
            },
            ssm: {
                name: 'SSM - State Space Model',
                description: 'Models that define sequence-to-sequence mappings through state space equations.',
                components: ['State Equation', 'Observation Equation', 'Kalman Filter', 'Smoothing'],
                pros: ['Efficient inference', 'Long sequences', 'Theoretical grounding', 'Linear complexity'],
                cons: ['Limited expressivity', 'Linear assumptions', 'Parameter tuning', 'State selection'],
                formula: '$$x_{k+1} = Ax_k + Bu_k + w_k \\quad y_k = Cx_k + Du_k + v_k$$',

            mlp: {
                name: 'MLP - Multilayer Perceptron',

                components: ['Input Layer', 'Hidden Layers', 'Output Layer', 'Activation Functions'],

                cons: ['Limited to fixed input size', 'No temporal modeling', 'Prone to overfitting', 'Gradient vanishing'],
                formula: '$$y = f(W_2 \\cdot f(W_1 x + b_1) + b_2)$$',
                examples: ['Vanilla MLP', 'ResNet', 'DenseNet', 'Neural ODE', 'MLP-Mixer'],
                useCases: ['Classification', 'Regression', 'Feature learning', 'Preprocessing', 'Tabular data']
            }
        };

        // Initialize Three.js
        function initThreeJS() {
            const container = document.getElementById('three-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            
            camera = new THREE.PerspectiveCamera(
                75,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(0, 0, 10);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);
            
            // Add lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 5, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            // Add grid
            const gridHelper = new THREE.GridHelper(20, 20, 0x00f5ff, 0x333333);
            gridHelper.position.y = -5;
            scene.add(gridHelper);
            
            // Handle resize
            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });
            
            // Initialize visualization
            initializeVisualization(currentArchitecture);
        }

        // Network visualization classes
        class NetworkVisualization {
            constructor(scene, architecture) {
                this.scene = scene;
                this.architecture = architecture;
                this.nodes = [];
                this.connections = [];
                this.animationTime = 0;
                this.group = new THREE.Group();
                this.scene.add(this.group);
            }
            
            clear() {
                this.group.clear();
                this.nodes = [];
                this.connections = [];
            }
            
            update(time) {
                this.animationTime = time;
                this.animate();
            }
            
            animate() {
                // Override in subclasses
            }
        }

        class CNNVisualization extends NetworkVisualization {
            initialize() {
                this.clear();
                
                // Create CNN layers
                const layers = [
                    { type: 'input', size: [28, 28, 1], position: [-6, 0, 0] },
                    { type: 'conv1', filters: 32, size: [26, 26, 32], position: [-3, 0, 0] },
                    { type: 'pool1', size: [13, 13, 32], position: [-1, 0, 0] },
                    { type: 'conv2', filters: 64, size: [11, 11, 64], position: [1, 0, 0] },
                    { type: 'pool2', size: [5, 5, 64], position: [3, 0, 0] },
                    { type: 'fc1', size: [128], position: [5, 0, 0] },
                    { type: 'output', size: [10], position: [7, 0, 0] }
                ];
                
                layers.forEach((layer, index) => {
                    const geometry = new THREE.BoxGeometry(1, 2, 1);
                    const material = new THREE.MeshLambertMaterial({
                        color: new THREE.Color().setHSL(index / layers.length, 0.7, 0.5)
                    });
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(...layer.position);
                    mesh.userData = layer;
                    
                    this.group.add(mesh);
                    this.nodes.push(mesh);
                });
                
                // Add connections
                for (let i = 0; i < layers.length - 1; i++) {
                    const start = layers[i].position;
                    const end = layers[i + 1].position;
                    
                    const geometry = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(...start),
                        new THREE.Vector3(...end)
                    ]);
                    
                    const material = new THREE.LineBasicMaterial({
                        color: 0x00f5ff,
                        opacity: 0.6,
                        transparent: true
                    });
                    
                    const line = new THREE.Line(geometry, material);
                    this.group.add(line);
                    this.connections.push(line);
                }
            }
            
            animate() {
                this.nodes.forEach((node, index) => {
                    node.rotation.y = this.animationTime * 0.5 + index * 0.1;
                    node.scale.setScalar(1 + Math.sin(this.animationTime * 2 + index) * 0.1);
                });
                
                this.connections.forEach((connection, index) => {
                    connection.material.opacity = 0.3 + Math.sin(this.animationTime * 3 + index) * 0.3;
                });
            }
        }

        class GANVisualization extends NetworkVisualization {
            initialize() {
                this.clear();
                
                // Create GAN components
                const generator = new THREE.Group();
                const discriminator = new THREE.Group();
                
                // Generator
                const genNodes = [];
                const genLayers = [100, 256, 512, 1024, 784];
                genLayers.forEach((size, index) => {
                    const geometry = new THREE.SphereGeometry(0.5, 32, 32);
                    const material = new THREE.MeshLambertMaterial({
                        color: new THREE.Color().setHSL(0.6 - index * 0.1, 0.7, 0.5)
                    });
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(-4 + index * 2, 2, 0);
                    mesh.userData = { type: 'generator', layer: index };
                    
                    generator.add(mesh);
                    genNodes.push(mesh);
                });
                
                // Discriminator
                const discNodes = [];
                const discLayers = [784, 1024, 512, 256, 1];
                discLayers.forEach((size, index) => {
                    const geometry = new THREE.SphereGeometry(0.5, 32, 32);
                    const material = new THREE.MeshLambertMaterial({
                        color: new THREE.Color().setHSL(0.9 - index * 0.1, 0.7, 0.5)
                    });
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(-4 + index * 2, -2, 0);
                    mesh.userData = { type: 'discriminator', layer: index };
                    
                    discriminator.add(mesh);
                    discNodes.push(mesh);
                });
                
                this.group.add(generator);
                this.group.add(discriminator);
                
                // Add adversarial arrows
                const arrowGeometry = new THREE.ConeGeometry(0.3, 1, 8);
                const arrowMaterial = new THREE.MeshLambertMaterial({ color: 0xff00ff });
                
                const upArrow = new THREE.Mesh(arrowGeometry, arrowMaterial);
                upArrow.position.set(3, 0.5, 0);
                upArrow.rotation.x = Math.PI;
                
                const downArrow = new THREE.Mesh(arrowGeometry, arrowMaterial);
                downArrow.position.set(3, -0.5, 0);
                
                this.group.add(upArrow);
                this.group.add(downArrow);
                
                this.nodes = [...genNodes, ...discNodes, upArrow, downArrow];
            }
            
            animate() {
                this.nodes.forEach((node, index) => {
                    if (node.userData.type === 'generator') {
                        node.position.y = 2 + Math.sin(this.animationTime * 2 + index) * 0.3;
                    } else if (node.userData.type === 'discriminator') {
                        node.position.y = -2 + Math.sin(this.animationTime * 2 + index + Math.PI) * 0.3;
                    }
                });
            }
        }

        class RNNVisualization extends NetworkVisualization {
            initialize() {
                this.clear();
                
                // Create RNN cells
                const numCells = 10;
                const cells = [];
                
                for (let i = 0; i < numCells; i++) {
                    const geometry = new THREE.TorusGeometry(1, 0.3, 8, 16);

                        color: new THREE.Color().setHSL(i / numCells, 0.7, 0.5)
                    });
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(-5 + i * 1.1, 0, 0);
                    mesh.userData = { cellIndex: i };
                    
                    this.group.add(mesh);
                    cells.push(mesh);
                    
                    // Add input/output connections
                    if (i < numCells - 1) {
                        const lineGeometry = new THREE.BufferGeometry().setFromPoints([
                            new THREE.Vector3(-5 + i * 1.1, 0, 0),
                            new THREE.Vector3(-5 + (i + 1) * 1.1, 0, 0)
                        ]);

                            opacity: 0.6,
                            transparent: true
                        });
                        
                        const line = new THREE.Line(lineGeometry, lineMaterial);
                        this.group.add(line);
                        this.connections.push(line);
                    }
                    
                    // Add recurrent connection
                    const recurrentGeometry = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(-5 + i * 1.1, 1, 0),
                        new THREE.Vector3(-5 + i * 1.1, -1, 0),
                        new THREE.Vector3(-5 + i * 1.1, 0, 0)
                    ]);
                    
                    const recurrentMaterial = new THREE.LineBasicMaterial({
                        color: 0xff00ff,

            animate() {

                this.connections.forEach((connection, index) => {
                    connection.material.opacity = 0.3 + Math.sin(this.animationTime * 2 + index) * 0.3;

        }

        class GNNVisualization extends NetworkVisualization {
            initialize() {
                this.clear();
                
                // Create graph structure
                const nodes = [];
                const edges = [];
                
                // Create nodes
                const numNodes = 8;
                const positions = [];
                
                for (let i = 0; i < numNodes; i++) {
                    const angle = (i / numNodes) * Math.PI * 2;
                    const radius = 3;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    const z = 0;
                    
                    positions.push([x, y, z]);
                    
                    const geometry = new THREE.SphereGeometry(0.3, 16, 16);
                    const material = new THREE.MeshLambertMaterial({
                        color: new THREE.Color().setHSL(i / numNodes, 0.7, 0.5)
                    });
                    
                    const mesh = new THREE.Mesh(geometry, material);
                    mesh.position.set(x, y, z);
                    mesh.userData = { nodeIndex: i };
                    
                    this.group.add(mesh);
                    nodes.push(mesh);
                }
                
                // Create edges (fully connected graph)
                for (let i = 0; i < numNodes; i++) {
                    for (let j = i + 1; j < numNodes; j++) {
                        const geometry = new THREE.BufferGeometry().setFromPoints([
                            new THREE.Vector3(...positions[i]),
                            new THREE.Vector3(...positions[j])
                        ]);
                        
                        const material = new THREE.LineBasicMaterial({
                            color: 0x00f5ff,
                            opacity: 0.3,
                            transparent: true
                        });
                        
                        const line = new THREE.Line(geometry, material);
                        this.group.add(line);
                        edges.push(line);
                    }
                }
                
                this.nodes = nodes;
                this.connections = edges;
            }
            
            animate() {
                this.nodes.forEach((node, index) => {
                    const angle = this.animationTime * 0.5 + (index / this.nodes.length) * Math.PI * 2;
                    const radius = 3 + Math.sin(this.animationTime * 2 + index) * 0.5;
                    node.position.x = Math.cos(angle) * radius;
                    node.position.y = Math.sin(angle) * radius;
                });
                
                // Update edge positions
                this.connections.forEach((edge, index) => {
                    const positions = edge.geometry.attributes.position;
                    const i = Math.floor(index / this.nodes.length);
                    const j = index % this.nodes.length;
                    
                    if (i < j) {
                        positions.setXYZ(0, this.nodes[i].position.x, this.nodes[i].position.y, this.nodes[i].position.z);
                        positions.setXYZ(1, this.nodes[j].position.x, this.nodes[j].position.y, this.nodes[j].position.z);
                        positions.needsUpdate = true;
                    }
                });
            }
        }

        class DQNVisualization extends NetworkVisualization {
            initialize() {
                this.clear();
                
                // Create DQN components
                const stateSize = 4;
                const actionSize = 2;
                
                // Create state input
                const stateGeometry = new THREE.BoxGeometry(0.5, 3, 0.5);
                const stateMaterial = new THREE.MeshLambertMaterial({ color: 0x00f5ff });
                const stateMesh = new THREE.Mesh(stateGeometry, stateMaterial);
                stateMesh.position.set(-4, 0, 0);
                this.group.add(stateMesh);
                
                // Create hidden layers
                const hiddenLayers = [64, 64];
                const hiddenNodes = [];
                
                hiddenLayers.forEach((size, layerIndex) => {
                    const layerNodes = [];
                    for (let i = 0; i < Math.min(size, 10); i++) {
                        const geometry = new THREE.SphereGeometry(0.2, 16, 16);
                        const material = new THREE.MeshLambertMaterial({
                            color: new THREE.Color().setHSL(0.6 + layerIndex * 0.2, 0.7, 0.5)
                        });
                        
                        const mesh = new THREE.Mesh(geometry, material);
                        mesh.position.set(-2 + layerIndex * 2, -2 + i * 0.5, 0);
                        this.group.add(mesh);
                        layerNodes.push(mesh);
                    }
                    hiddenNodes.push(layerNodes);
                });
                
                // Create action output
                const actionGeometry = new THREE.BoxGeometry(0.5, 1, 0.5);
                const actionMaterial = new THREE.MeshLambertMaterial({ color: 0xff00ff });
                
                for (let i = 0; i < actionSize; i++) {
                    const mesh = new THREE.Mesh(actionGeometry, actionMaterial);
                    mesh.position.set(4, -0.5 + i, 0);
                    this.group.add(mesh);
                }
                
                // Add environment visualization
                const envGeometry = new THREE.PlaneGeometry(2, 1.5);
                const envMaterial = new THREE.MeshLambertMaterial({ color: 0xffff00 });
                const envMesh = new THREE.Mesh(envGeometry, envMaterial);
                envMesh.position.set(0, 3, 0);
                this.group.add(envMesh);
                
                this.nodes = [stateMesh, ...hiddenNodes.flat()];
            }
            
            animate() {
                this.nodes.forEach((node, index) => {
                    if (node.geometry.type === 'SphereGeometry') {
                        node.scale.setScalar(1 + Math.sin(this.animationTime * 3 + index) * 0.2);
                    }
                });
            }
        }

        class DiffusionVisualization extends NetworkVisualization {
            initialize() {
                this.clear();
                
                // Create diffusion process visualization
                const steps = 5;
                const grids = [];
                
                for (let i = 0; i < steps; i++) {
                    const gridGroup = new THREE.Group();
                    
                    // Create grid of particles
                    const gridSize = 8;
                    const particles = [];
                    
                    for (let x = 0; x < gridSize; x++) {
                        for (let y = 0; y < gridSize; y++) {
                            const geometry = new THREE.SphereGeometry(0.05, 8, 8);
                            const material = new THREE.MeshLambertMaterial({
                                color: new THREE.Color().setHSL(0.7 - i * 0.1, 0.7, 0.5)
                            });
                            
                            const mesh = new THREE.Mesh(geometry, material);
                            mesh.position.set(
                                -4 + i * 2 + (x - gridSize/2) * 0.15,
                                (y - gridSize/2) * 0.15,
                                0
                            );
                            
                            gridGroup.add(mesh);
                            particles.push(mesh);
                        }
                    }
                    
                    this.group.add(gridGroup);
                    grids.push(particles);
                }
                
                // Add arrows between steps
                const arrowGeometry = new THREE.ConeGeometry(0.1, 0.3, 8);
                const arrowMaterial = new THREE.MeshLambertMaterial({ color: 0x00f5ff });
                
                for (let i = 0; i < steps - 1; i++) {
                    const arrow = new THREE.Mesh(arrowGeometry, arrowMaterial);
                    arrow.position.set(-3 + i * 2, 0, 0);
                    this.group.add(arrow);
                }
                
                this.nodes = grids.flat();
            }
            
            animate() {
                this.nodes.forEach((node, index) => {
                    const originalX = node.position.x;
                    const originalY = node.position.y;
                    
                    node.position.x = originalX + Math.sin(this.animationTime * 2 + index) * 0.02;
                    node.position.y = originalY + Math.cos(this.animationTime * 2 + index) * 0.02;
                    
                    node.scale.setScalar(1 + Math.sin(this.animationTime * 3 + index) * 0.3);
                });
            }
        }

        class MoEVisualization extends NetworkVisualization {
            initialize() {
                this.clear();
                
                // Create gating network
                const gateGeometry = new THREE.OctahedronGeometry(0.5);
                const gateMaterial = new THREE.MeshLambertMaterial({ color: 0x00f5ff });
                const gateMesh = new THREE.Mesh(gateGeometry, gateMaterial);
                gateMesh.position.set(0, 0, 0);
                this.group.add(gateMesh);
                
                // Create experts
                const numExperts = 8;
                const experts = [];
                
                for (let i = 0; i < numExperts; i++) {
                    const angle = (i / numExperts) * Math.PI * 2;
                    const radius = 3;
                    
                    const expertGeometry = new THREE.ConeGeometry(0.3, 1, 6);
                    const expertMaterial = new THREE.MeshLambertMaterial({
                        color: new THREE.Color().setHSL(i / numExperts, 0.7, 0.5)
                    });
                    
                    const expert = new THREE.Mesh(expertGeometry, expertMaterial);
                    expert.position.set(
                        Math.cos(angle) * radius,
                        Math.sin(angle) * radius,
                        0
                    );
                    expert.lookAt(0, 0, 0);
                    
                    this.group.add(expert);
                    experts.push(expert);
                    
                    // Add connection to gate
                    const geometry = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(0, 0, 0),
                        new THREE.Vector3(Math.cos(angle) * radius, Math.sin(angle) * radius, 0)
                    ]);
                    
                    const material = new THREE.LineBasicMaterial({
                        color: 0xff00ff,
                        opacity: 0.3,
                        transparent: true
                    });
                    
                    const line = new THREE.Line(geometry, material);
                    this.group.add(line);
                    this.connections.push(line);
                }
                
                this.nodes = [gateMesh, ...experts];
            }
            
            animate() {
                this.nodes[0].rotation.x = this.animationTime * 0.5;
                this.nodes[0].rotation.y = this.animationTime * 0.7;
                
                this.nodes.slice(1).forEach((expert, index) => {
                    expert.scale.setScalar(1 + Math.sin(this.animationTime * 2 + index) * 0.2);
                });
                
                this.connections.forEach((line, index) => {
                    line.material.opacity = 0.1 + Math.sin(this.animationTime * 3 + index) * 0.2;
                });

        class SSMVisualization extends NetworkVisualization {
            initialize() {
                this.clear();
                
                // Create state space visualization
                const stateGeometry = new THREE.SphereGeometry(1, 32, 32);
                const stateMaterial = new THREE.MeshLambertMaterial({
                    color: 0x00f5ff,
                    wireframe: true
                });
                const stateMesh = new THREE.Mesh(stateGeometry, stateMaterial);
                this.group.add(stateMesh);
                
                // Create state transitions
                const transitions = [];
                for (let i = 0; i < 20; i++) {
                    const geometry = new THREE.BufferGeometry().setFromPoints([
                        new THREE.Vector3(0, 0, 0),
                        new THREE.Vector3(
                            Math.random() * 2 - 1,
                            Math.random() * 2 - 1,
                            Math.random() * 2 - 1
                        ).normalize().multiplyScalar(1.5)
                    ]);
                    
                    const material = new THREE.LineBasicMaterial({
                        color: 0xff00ff,
                        opacity: 0.3,
                        transparent: true
                    });
                    
                    const line = new THREE.Line(geometry, material);
                    this.group.add(line);
                    transitions.push(line);
                }
                
                this.nodes = [stateMesh];
                this.connections = transitions;
            }
            
            animate() {
                this.nodes[0].rotation.x = this.animationTime * 0.3;
                this.nodes[0].rotation.y = this.animationTime * 0.5;
                this.nodes[0].scale.setScalar(1 + Math.sin(this.animationTime) * 0.1);

                    line.rotation.y = this.animationTime * 0.7 + index;

        class MLPVisualization extends NetworkVisualization {
            initialize() {
                this.clear();
                
                // Create MLP layers
                const layers = [4, 8, 8, 4, 2];
                const layerNodes = [];
                
                layers.forEach((size, layerIndex) => {
                    const nodes = [];
                    const layerGroup = new THREE.Group();
                    
                    for (let i = 0; i < size; i++) {
                        const geometry = new THREE.SphereGeometry(0.3, 16, 16);
                        const material = new THREE.MeshLambertMaterial({
                            color: new THREE.Color().setHSL(layerIndex / layers.length, 0.7, 0.5)
                        });
                        
                        const mesh = new THREE.Mesh(geometry, material);
                        mesh.position.set(
                            -4 + layerIndex * 2,
                            -size/2 + i + 0.5,

                        );
                        
                        layerGroup.add(mesh);
                        nodes.push(mesh);
                    }
                    
                    this.group.add(layerGroup);
                    layerNodes.push(nodes);
                });
                
                // Add connections between layers
                for (let l = 0; l < layerNodes.length - 1; l++) {
                    for (let i = 0; i < layerNodes[l].length; i++) {
                        for (let j = 0; j < layerNodes[l + 1].length; j++) {
                            const geometry = new THREE.BufferGeometry().setFromPoints([
                                layerNodes[l][i].position,
                                layerNodes[l + 1][j].position
                            ]);
                            
                            const material = new THREE.LineBasicMaterial({
                                color: 0x00f5ff,
                                opacity: 0.3,
                                transparent: true
                            });
                            
                            const line = new THREE.Line(geometry, material);
                            this.group.add(line);
                            this.connections.push(line);
                        }
                    }
                }
                
                this.nodes = layerNodes.flat();
            }
            
            animate() {
                this.nodes.forEach((node, index) => {
                    node.scale.setScalar(1 + Math.sin(this.animationTime * 2 + index) * 0.2);
                });
                
                this.connections.forEach((connection, index) => {
                    connection.material.opacity = 0.1 + Math.sin(this.animationTime * 3 + index) * 0.2;
                });
            }
        }

        // Initialize visualization based on architecture
        function initializeVisualization(architecture) {
            if (networkVisualization) {
                networkVisualization.clear();
            }
            
            switch (architecture) {
                case 'cnn':
                    networkVisualization = new CNNVisualization(scene);
                    break;
                case 'gan':
                    networkVisualization = new GANVisualization(scene);
                    break;
                case 'rnn':
                    networkVisualization = new RNNVisualization(scene);
                    break;
                case 'gnn':
                    networkVisualization = new GNNVisualization(scene);
                    break;
                case 'dqn':
                    networkVisualization = new DQNVisualization(scene);
                    break;
                case 'diffusion':
                    networkVisualization = new DiffusionVisualization(scene);
                    break;
                case 'transformer':
                    networkVisualization = new TransformerVisualization(scene);
                    break;
                case 'moe':
                    networkVisualization = new MoEVisualization(scene);
                    break;
                case 'ssm':
                    networkVisualization = new SSMVisualization(scene);
                    break;
                case 'mlp':
                    networkVisualization = new MLPVisualization(scene);
                    break;
            }
            
            networkVisualization.initialize();
            updateArchitectureInfo(architecture);
            updateExamples(architecture);
            updateStats(architecture);
        }

                    <p>${arch.description}</p>
                </div>
                
                <div class="info-section">
                    <h3>Mathematical Formulation</h3>
                    <div class="math-formula">
                        ${arch.formula}
                    </div>
                </div>
                
                <div class="info-section">
                    <h3>Pros & Cons</h3>
                    <div class="pros-cons">
                        <div class="pros">
                            <h4><i class="fas fa-check-circle"></i> Advantages</h4>
                            <ul>
                                ${arch.pros.map(pro => `<li>${pro}</li>`).join('')}
                            </ul>
                        </div>
                        <div class="cons">
                            <h4><i class="fas fa-times-circle"></i> Disadvantages</h4>
                            <ul>
                                ${arch.cons.map(con => `<li>${con}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </div>
                
                <div class="info-section">
                    <h3>Components Breakdown</h3>
                    <div class="component-breakdown">
                        ${arch.components.map(comp => `
                            <div class="component-item">
                                <strong>${comp}</strong> - Key component of the architecture
                            </div>
                        `).join('')}
                    </div>
                </div>
                
                <div class="info-section">
                    <h3>Use Cases</h3>
                    <ul>
                        ${arch.useCases.map(useCase => `<li>${useCase}</li>`).join('')}
                    </ul>
                </div>
                
                <div class="info-section">
                    <h3>Variants & Examples</h3>
                    <ul>
                        ${arch.examples.map(example => `<li>${example}</li>`).join('')}
                    </ul>
                </div>
            `;
            
            document.getElementById('archTitle').textContent = arch.name;
            
            // Trigger MathJax to render formulas
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        // Update examples
        function updateExamples(architecture) {
            const examples = architectures[architecture].examples;
            const container = document.getElementById('exampleButtons');
            
            container.innerHTML = examples.map(example => 
                `<button class="example-btn" data-example="${example}">${example}</button>`
            ).join('');
            
            // Add click handlers
            container.querySelectorAll('.example-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    container.querySelectorAll('.example-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    loadExample(e.target.dataset.example);
                });
            });
        }

        // Update statistics
        function updateStats(architecture) {
            const stats = {
                cnn: { params: '138M', memory: '527MB', flops: '15.5G', accuracy: '76.1%' },
                gan: { params: '23M', memory: '88MB', flops: '2.6G', accuracy: 'N/A' },
                rnn: { params: '35M', memory: '134MB', flops: '4.0G', accuracy: '87.3%' },
                gnn: { params: '1.2M', memory: '4.6MB', flops: '137M', accuracy: '92.4%' },
                dqn: { params: '5.5M', memory: '21MB', flops: '629M', accuracy: 'N/A' },
                diffusion: { params: '860M', memory: '3.3GB', flops: '98.3G', accuracy: 'N/A' },
                transformer: { params: '175B', memory: '672GB', flops: '20T', accuracy: '95.7%' },
                moe: { params: '1.6T', memory: '6.1TB', flops: '184T', accuracy: '97.2%' },
                ssm: { params: '2.8B', memory: '11GB', flops: '322G', accuracy: '94.1%' },
                mlp: { params: '45M', memory: '172MB', flops: '5.1G', accuracy: '89.5%' }
            };
            
            const stat = stats[architecture];
            document.getElementById('paramCount').textContent = stat.params;
            document.getElementById('memoryUsage').textContent = stat.memory;
            document.getElementById('flops').textContent = stat.flops;
            document.getElementById('accuracy').textContent = stat.accuracy;
            
            // Animate training progress
            const progress = Math.random() * 100;
            document.getElementById('trainingProgress').style.width = progress + '%';
        }

        // Load example
        function loadExample(example) {
            console.log('Loading example:', example);
            // In a real implementation, this would load specific configurations
            // For now, we'll just update the stats
            updateStats(currentArchitecture);
        }

        // Animation loop
        function animate() {
            if (isPlaying) {
                animationId = requestAnimationFrame(animate);
                
                const time = Date.now() * 0.001;
                if (networkVisualization) {
                    networkVisualization.update(time);
                }
                
                renderer.render(scene, camera);
            }
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Hide loading overlay
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loadingOverlay').style.display = 'none';
                }, 500);
            }, 1000);
            
            // Initialize Three.js
            initThreeJS();
            
            // Architecture selection
            document.querySelectorAll('.architecture-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.architecture-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentArchitecture = e.target.dataset.arch;
                    initializeVisualization(currentArchitecture);
                });
            });
            
            // Control panel
            document.getElementById('learningRate').addEventListener('input', (e) => {
                document.getElementById('lrValue').textContent = e.target.value;
            });
            
            // Play/Pause
            document.getElementById('playPause').addEventListener('click', () => {
                isPlaying = !isPlaying;
                const btn = document.getElementById('playPause');
                btn.innerHTML = isPlaying ? 
                    '<i class="fas fa-pause"></i> Pause' : 
                    '<i class="fas fa-play"></i> Play';
                
                if (isPlaying) {
                    animate();
                } else {
                    cancelAnimationFrame(animationId);
                }
            });
            
            // Reset
            document.getElementById('reset').addEventListener('click', () => {
                initializeVisualization(currentArchitecture);
            });
            
            // Fullscreen
            document.getElementById('fullscreen').addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    document.exitFullscreen();
                }
            });
            
            // Start animation
            isPlaying = true;
            animate();
        });
    </script>
</body>
</html>
